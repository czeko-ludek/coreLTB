# wrangler.toml - Konfiguracja Cloudflare Pages dla Next.js

# Nazwa projektu (opcjonalnie, możesz zmienić)
name = "coreltb-v2"

# Compatibility date dla Cloudflare Workers
compatibility_date = "2024-01-01"

# Pages configuration
pages_build_output_dir = ".next"

# Exclude .next/cache folder (webpack cache > 25MB limit)
[build]
command = "npm run build"
cwd = ""
watch_dirs = ["app", "components", "public"]

# Exclude rules - ignoruj folder cache podczas deploymentu
[site]
bucket = ".next"

# Ignorowane pliki i foldery (wykluczenie z uploadu)
exclude = [
  ".next/cache/**",
  ".next/cache",
  "node_modules/**",
  ".git/**",
  ".env*",
  "*.log"
]
